services:
  mysql:
    image: mysql:8.0
    container_name: roadlink-mysql
    environment:
      TERM: xterm-256color
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: roadlink
      MYSQL_USER: roadlink
      MYSQL_PASSWORD: roadlink
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroadlink", "-proadlink"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: roadlink-backend
    environment:
      TERM: xterm-256color
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: roadlink
      DB_USERNAME: roadlink
      DB_PASSWORD: roadlink
      QUEUE_CONNECTION: sync
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          php -r '$$ctx = stream_context_create(["http" => ["timeout" => 2]]);
          $$body = @file_get_contents("http://127.0.0.1:8000/up", false, $$ctx);
          exit($$body === false ? 1 : 0);'
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: roadlink-scheduler
    environment:
      TERM: xterm-256color
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: roadlink
      DB_USERNAME: roadlink
      DB_PASSWORD: roadlink
      QUEUE_CONNECTION: sync
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: roadlink-frontend
    working_dir: /app
    environment:
      TERM: xterm-256color
      VITE_API_URL: http://localhost:8000/api/v1
      VITEST_API_URL: http://backend:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port=3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules:
  backend_vendor:
